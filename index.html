<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rezerwacja wizyty</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Rezerwacja wizyty</h1>

<label>Data</label>
<input type="date" id="date">
<select id="service">
  <option value="Strzyżenie męskie">Strzyżenie męskie</option>
  <option value="Broda">Broda</option>
  <option value="Strzyżenie + broda">Strzyżenie + broda</option>
</select>

<h2>Dostępne godziny</h2>

<div id="slots"></div>

<h2>Dane</h2>

<input id="name" placeholder="Imię i nazwisko">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Telefon">

<button id="book">Zarezerwuj</button>

<div id="msg"></div>

<script src="script.js"></script>

</body>
</html>
